<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/icons8-câmbio-monetário-16.png">
   
    <title> ConversorJS</title>
</head>
<body>

    <img class="logo" src="./assets/logo.gif.gif" alt="">

    <main>
        <label>
            Converter <b>De</b>
            <select>
                <option> R$ Real brasileiro </option>
            </select>
        </label>

        <label>
            Converter <b>Para</b>
            <select class="currency-select">
            <option value="dolar"> US$ Dólar americano</option>
            <option value="euro"> € Euro </option>
        </select>
        </label>

        <label>
            Valor
            <input class="input-curency" placeholder="R$ 10.000,00">
        </label>

        <button class="convert-button"> Converter </button>

        <section>
            <div class="currency-box">
                <img class="brasil" src="./assets/brasil (3).png" alt="brasil.logo">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img class="seta" src="./assets/Vector (2).png" alt="seta.logo">

            <div class="currency-box">
                <img class="usa" src="./assets/usa.png" alt="eua.logo">
                <p class="currency" id="currency-name">Dólar</p>
                <p class="currency-value">US$ 0.0</p>
            </div>
        </section>
    </main>
     <script src="./scripts.js" ></script>
</body>
</html>
